name: Generate Omni-Scribe Docs

on:
  pull_request:
    types: [closed]

jobs:
  generate-docs:
    # Only run when a PR is merged (not just closed)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    env:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install omni-scribe
        run: go install github.com/Taiwrash/omni-scribe@latest

      - name: Authenticate to Google Cloud
        # This step is only required if you want to store results directly in Google Cloud Storage.
        # It configures Google Application Default Credentials (ADC) for the Go Storage Client.
        if: ${{ env.GCP_SA_KEY != '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}

      - name: Generate and Save PR Docs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GCS_BUCKET: ${{ secrets.GCS_BUCKET || 'omni-scribe-docs' }}
        run: omni-scribe generate --pr ${{ github.event.pull_request.number }}

      - name: Post PR comment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const baseUrl = '${{ vars.OMNI_SCRIBE_URL || 'https://omni-scribe-docs.run.app' }}';
            const docsUrl = `${baseUrl}/pr/${prNumber}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `📖 **Docs generated by Omni-Scribe**\n\nView the auto-generated documentation for this PR:\n🔗 ${docsUrl}\n\n_Powered by [omni-scribe](https://github.com/Taiwrash/omni-scribe) + Gemini_`
            });
